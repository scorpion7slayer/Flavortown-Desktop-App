name: Release desktop builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS universal
            runner: macos-latest
            rust-targets: x86_64-apple-darwin,aarch64-apple-darwin
            args: --target universal-apple-darwin
          - name: Windows x64
            runner: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
          - name: Windows x86
            runner: windows-latest
            rust-targets: i686-pc-windows-msvc
            args: --target i686-pc-windows-msvc
          - name: Windows ARM64
            runner: windows-latest
            rust-targets: aarch64-pc-windows-msvc
            args: --target aarch64-pc-windows-msvc
          - name: Linux x64
            runner: ubuntu-22.04
            rust-targets: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu
          - name: Linux ARM64
            runner: ubuntu-22.04-arm
            rust-targets: aarch64-unknown-linux-gnu
            args: --target aarch64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: startsWith(matrix.runner, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2 xdg-utils

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Flavortown Desktop App v__VERSION__"
          releaseBody: "Desktop builds for macOS, Windows, and Linux. macOS is ad-hoc signed and not notarized, so users may need to allow it in Privacy & Security."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
